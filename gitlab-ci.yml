---
# .gitlab-ci.yml
# CI/CD для ZGT — локальный GitLab + Docker

stages:
  - lint
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  # Имя стека для docker compose
  COMPOSE_PROJECT_NAME: zgt

# ── Шаблоны ─────────────────────────────────────────────────────────────────

.only-main: &only-main
  only:
    - main
    - master

.only-merge-request: &only-merge-request
  only:
    - merge_requests

# ── LINT ─────────────────────────────────────────────────────────────────────

lint:backend:
  stage: lint
  image: python:3.12-slim
  cache:
    key: backend-pip-$CI_COMMIT_REF_SLUG
    paths:
      - .pip-cache/
  before_script:
    - pip install --cache-dir .pip-cache ruff mypy
  script:
    - cd backend
    - ruff check app/
    - echo "Backend lint passed"
  <<: *only-merge-request

lint:frontend:
  stage: lint
  image: node:20-alpine
  cache:
    key: frontend-bun-$CI_COMMIT_REF_SLUG
    paths:
      - frontend/node_modules/
  before_script:
    - npm install -g bun
    - cd frontend && bun install --frozen-lockfile
  script:
    - cd frontend
    - bun run type-check
    - echo "Frontend type-check passed"
  <<: *only-merge-request

# ── BUILD ────────────────────────────────────────────────────────────────────

build:images:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker info
    - cp .env.example .env
    # Подставляем переменные из CI/CD secrets GitLab
    - |
      cat > .env <<EOF
      POSTGRES_USER=${POSTGRES_USER}
      POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      POSTGRES_DB=${POSTGRES_DB}
      SECRET_KEY=${SECRET_KEY}
      BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS}
      NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      DEBUG=false
      SECURE_COOKIES=false
      ACCESS_TOKEN_EXPIRE_MINUTES=60
      BCRYPT_ROUNDS=12
      EOF
  script:
    - docker compose build --no-cache
    - docker compose config --quiet  # валидация конфига
  <<: *only-main

# ── DEPLOY ───────────────────────────────────────────────────────────────────

deploy:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
  script:
    # Синхронизируем код на сервер (без node_modules и .next)
    - |
      rsync -avz --delete \
        --exclude='.git' \
        --exclude='node_modules' \
        --exclude='.next' \
        --exclude='__pycache__' \
        --exclude='*.pyc' \
        --exclude='.env' \
        . $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH
    # Запускаем деплой на сервере
    - |
      ssh $DEPLOY_USER@$DEPLOY_HOST "
        cd $DEPLOY_PATH
        docker compose pull db 2>/dev/null || true
        docker compose build --no-cache
        docker compose run --rm migrate
        docker compose up -d --remove-orphans
        docker system prune -f
        echo 'Deploy complete!'
      "
  environment:
    name: production
    url: http://$DEPLOY_HOST
  <<: *only-main
  when: manual   # Ручной запуск деплоя (раскомментируйте 'when: on_success' для auto)

# ── HEALTH CHECK после деплоя ────────────────────────────────────────────────

healthcheck:
  stage: deploy
  image: alpine:latest
  needs: [deploy:production]
  before_script:
    - apk add --no-cache curl
  script:
    - sleep 20
    - curl -f http://$DEPLOY_HOST/health || (echo "Backend unhealthy!" && exit 1)
    - curl -f http://$DEPLOY_HOST/ || (echo "Frontend unhealthy!" && exit 1)
    - echo "All services healthy!"
  <<: *only-main
